    <title>Book Explorer</title> <!-- Browser tab title -->

    <!-- Tailwind CSS CDN link -->

</head> <!-- End of head -->

<body class="bg-gray-100 min-h-screen flex flex-col"> <!-- Body styled with background and vertical flex layout -->

    <!-- ================= NAVBAR ================= -->
    <nav class="bg-blue-600 text-white p-4"> <!-- Navigation bar container -->
        
        <div class="max-w-6xl mx-auto flex justify-between items-center"> <!-- Centers content and spaces items -->

            <ul class="flex space-x-6"> <!-- Navigation links container -->
                
                <li>
                    <a href="index.html" class="hover:underline">Home</a> <!-- Home link -->

                <li>

                </li>

                </li>

        </div>

            <div class="bg-white p-4 rounded shadow">
